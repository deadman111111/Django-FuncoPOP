{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<h1 class="page-title">Вход</h1>

<form method="post" class="custom-form">
    {% csrf_token %}

    <div class="form-group">
        <label class="form-label" for="id_username">Имя пользователя</label>
        <input type="text" name="username" id="id_username" class="form-input">
    </div>

    <div class="form-group">
        <label class="form-label" for="id_password">Пароль</label>
        <input type="password" name="password" id="id_password" class="form-input">
    </div>

    <button type="submit" class="btn">Войти</button>
</form>
{% endblock %}
